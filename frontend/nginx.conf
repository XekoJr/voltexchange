server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (vue-router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # config.js é gerado no arranque do container — nunca cachear
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # Assets com hash no nome podem ser cacheados agressivamente
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
